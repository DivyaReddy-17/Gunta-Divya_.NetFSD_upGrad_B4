<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Student Profile System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      padding: 30px;
    }

    .profile {
      width: 300px;
      padding: 15px;
      border: 2px solid #4CAF50;
      border-radius: 8px;
      background-color: #ffffff;
    }

    .profile h3 {
      margin-top: 0;
      color: #2e7d32;
    }

    button {
      margin-top: 15px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="studentProfile"></div>

  <button onclick="updateMarks(92)">Update Marks</button>

  <script>
    let student = {
      name: "Madhavi",
      rollNo:73,
      marks:95
    };
    function updateStudentProfile(studentObj) {
      const profileDiv = document.getElementById("studentProfile");

      profileDiv.innerHTML = `
        <div class="profile">
          <h3>Student Profile</h3>
          <p><strong>Name:</strong> ${studentObj.name}</p>
          <p><strong>Roll No:</strong> ${studentObj.rollNo}</p>
          <p><strong>Marks:</strong> ${studentObj.marks}</p>
        </div>
      `;
    }
    function updateMarks(newMarks) {
      student.marks = newMarks; 
      updateStudentProfile(student);
    }
    updateStudentProfile(student);
  </script>

</body>
</html>
