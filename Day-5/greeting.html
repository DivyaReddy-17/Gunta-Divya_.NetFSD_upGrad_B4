<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greeting Generator</title>
</head>
<body>

    <h2>Greeting Generator</h2>

    <input type="text" id="nameInput" placeholder="Enter your name">

    <button onclick="handleGreeting()">Generate Greeting</button>

    <p id="greetingMessage"></p>

    <script>
        function handleGreeting() {
            var name = document.getElementById("nameInput").value;
            generateGreeting(name);
        }

        function generateGreeting(name) {
            var greeting = "Hello, " + name + "! Welcome to our website.";
            document.getElementById("greetingMessage").innerText = greeting;
        }
    </script>

</body>
</html>
